# steering_servo parameters
steering_servo_node:
  ros__parameters:
    # Hardware PWM
    pwm_chip: 0
    pwm_channel: 0          # PWM0 = GPIO 12

    # DS3235-180 servo range
    servo_min_deg: 25.0      # physical hard-stop left
    servo_max_deg: 172.0     # physical hard-stop right
    servo_center_deg: 100.0   # straight ahead

    # DS3235-180 pulse range
    pulse_min_us: 500        # 0°
    pulse_max_us: 2500       # 180°
    period_ns: 20000000      # 50 Hz

    # Discrete steering control
    button_center: 3         # button to center servo

    # Proportional steering (axis 0 stick X) — experimental
    axis_proportional: 0
    proportional_deadzone: 0.2    # joystick deadzone (0.0–1.0) TODO tune TODO sync with joy_mapper_node axis0_deadzone
    angle_deadband: 2.0           # ignore angle changes smaller than this (degrees)
                                  #  increase if servo still jitters, decrease if it feels sluggish
    slew_rate_deg: 180.0            # max degrees per update step
                                  # increase for faster response, decrease for smoother movement
    update_interval_ms: 0        # min milliseconds between servo commands
                                 # decrease for more responsive (20ms = very responsive), increase for more relaxed
